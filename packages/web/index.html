<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WebHost</title>
    <style>
      :root {
        color-scheme: dark;
      }

      html,
      body {
        margin: 0;
        height: 100%;
        background: #000;
      }

      #webhost-root,
      .webhost-scene-root,
      .webhost-scene {
        width: 100%;
        height: 100%;
      }

      .webhost-scene__header {
        display: none;
      }

      .webhost-scene__terminal {
        width: 100%;
        height: 100%;
        min-height: 100%;
        touch-action: none;
        -webkit-user-select: none;
        user-select: none;
        cursor: default;
      }

      .webhost-scene__terminal canvas {
        touch-action: none;
        cursor: default;
      }
    </style>
    <script type="module" src="./src/browser.ts"></script>
  </head>
  <body>
    <main id="webhost-root"></main>
  </body>
</html>
