name: Test

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: web-test-${{ github.ref }}
  cancel-in-progress: true

env:
  BUN_VERSION: "1.3.13"

jobs:
  test:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      # Stages mirror `bun run ci` (the repo gate). build:packages must run
      # before build:web: since 0.0.15 the packages ship compiled dist/, so
      # @swifttui/build imports @swifttui/web/manifest from dist/manifest.js.
      - run: bun install --frozen-lockfile
      - run: bun run test
      - run: bun run build:packages
      - run: bun run build:web
